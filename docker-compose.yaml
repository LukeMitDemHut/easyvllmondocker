services:
  # --- GATEWAY ---
  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:litellm_stable_v1_82_3-v1.82.3}
    ports: ["${GATEWAY_PORT:-8000}:4000"]
    container_name: litellm
    volumes:
      - ./model_config:/model_config:ro
    working_dir: /model_config
    entrypoint: ["litellm", "--config", "/model_config/litellm_config.yaml", "--num_workers", "${LITELLM_NUM_WORKERS:-4}"]

    environment:
      - DATABASE_URL=postgresql://llm_admin:${POSTGRES_PASSWORD}@postgres:5432/litellm
      - STORE_MODEL_IN_DB=True
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      - UI_USERNAME=${LITELLM_USERNAME}
      - UI_PASSWORD=${LITELLM_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: postgres
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=llm_admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_admin -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # --- PROMETHEUS ---
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.12.0}
    container_name: prometheus
    volumes:
      - ./prometheus_config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  node_exporter:
    image: ${NODE_EXPORTER_IMAGE:-quay.io/prometheus/node-exporter:v1.11.1}
    container_name: node_exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    volumes:
      - "/:/host:ro,rslave"

  dcgm_exporter:
    image: ${DCGM_EXPORTER_IMAGE:-nvcr.io/nvidia/k8s/dcgm-exporter:4.4.1-4.6.0-ubuntu22.04}
    container_name: dcgm_exporter
    runtime: nvidia
    gpus: all
    cap_add:
      - SYS_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$${DCGM_REMOTE_HOSTENGINE_INFO:-}" ]; then
          unset DCGM_REMOTE_HOSTENGINE_INFO
        fi
        exec dcgm-exporter
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DCGM_REMOTE_HOSTENGINE_INFO=${DCGM_REMOTE_HOSTENGINE_INFO:-}
      - DCGM_EXPORTER_DEVICES_STR=${DCGM_EXPORTER_DEVICES_STR:-f}
      - DCGM_EXPORTER_INTERVAL=${DCGM_EXPORTER_INTERVAL:-30000}
    restart: unless-stopped

  # --- GRAFANA ---
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_config/datasources:/etc/grafana/provisioning/datasources/
      - ./grafana_config/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./grafana_config/dashboards:/etc/grafana/provisioning/dashboards/
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/home.json
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  default:
    name: inference_default

volumes:
  prometheus_data:
    driver: local
  postgres_data:
    driver: local
